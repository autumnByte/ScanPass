<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ScanPass Scanner – AntBox</title>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

    <style>
      /* ═══════════ TOKENS ═══════════ */
      :root {
        --bg:            #F7F5F0;
        --bg-card:       #FFFFFF;
        --accent:        #8E44EC;
        --accent-light:  #F0E9FD;
        --accent-glow:   rgba(142,68,236,0.22);
        --accent-border: rgba(142,68,236,0.28);
        --text:          #111111;
        --text-muted:    #666666;
        --text-faint:    #999999;
        --border:        #EAE6DD;
        --green:         #16A34A;
        --green-bg:      #DCFCE7;
        --green-border:  rgba(22,163,74,0.25);
        --red:           #DC2626;
        --red-bg:        #FEE2E2;
        --red-border:    rgba(220,38,38,0.25);
        --amber:         #D97706;
        --amber-bg:      #FEF3C7;
        --amber-border:  rgba(217,119,6,0.25);
        --font: 'Plus Jakarta Sans', sans-serif;
        --mono: 'JetBrains Mono', monospace;
        --r:  12px;
        --rl: 20px;
        --rx: 28px;
        --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
        --shadow-lg: 0 2px 8px rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.08);
      }
      *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
      html { background: var(--bg); }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .hidden { display: none !important; }

      /* ── APP SHELL ── */
      .app { max-width: 430px; margin: 0 auto; padding: 0 16px 32px; }

      /* ── TOPBAR ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0 12px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
      }
      .topbar-logo { display:flex; align-items:center; gap:8px; }
      .logo-mark {
        width:32px; height:32px;
        background:var(--accent); border-radius:9px;
        display:flex; align-items:center; justify-content:center;
        box-shadow: 0 2px 10px var(--accent-glow);
      }
      .logo-mark svg { width:16px; height:16px; }
      .logo-name { font-size:16px; font-weight:800; color:var(--text); letter-spacing:-0.3px; }
      .logo-name span { color:var(--accent); }
      .topbar-right { display:flex; align-items:center; gap:8px; }
      .badge-live {
        display:flex; align-items:center; gap:4px;
        padding:3px 8px;
        background:var(--bg-card); border:1px solid var(--border);
        border-radius:20px;
        font-family:var(--mono); font-size:9px; color:var(--text-faint);
      }
      .live-dot { width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s infinite; }
      @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

      /* ── MINI STATS ── */
      .stats-row {
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
        gap:8px;
        margin-bottom:16px;
      }
      .stat-tile {
        background:var(--bg-card);
        border:1px solid var(--border);
        border-radius:var(--r);
        padding:12px;
        box-shadow:var(--shadow);
        text-align:center;
        position:relative; overflow:hidden;
      }
      .stat-tile::before { content:'';position:absolute;top:0;left:0;right:0;height:2px; }
      .st-a::before { background:var(--accent); }
      .st-g::before { background:var(--green);  }
      .st-r::before { background:var(--red);    }
      .stat-label { font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px; }
      .stat-val   { font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);line-height:1; }
      .stat-val.a { color:var(--accent); }
      .stat-val.g { color:var(--green);  }

      /* ── MODE TOGGLE ── */
      .mode-toggle {
        display:flex; gap:6px; margin-bottom:14px;
        background:var(--bg-card); border:1px solid var(--border);
        border-radius:var(--r); padding:4px;
        box-shadow:var(--shadow);
      }
      .mode-btn {
        flex:1; padding:9px 6px;
        background:none; border:none;
        color:var(--text-faint);
        font-family:var(--font); font-size:12px; font-weight:600;
        border-radius:9px; cursor:pointer;
        display:flex; align-items:center; justify-content:center; gap:5px;
        transition:all 0.2s;
      }
      .mode-btn svg { width:13px;height:13px; }
      .mode-btn.active { background:var(--accent-light); color:var(--accent); }

      /* ── SCANNER CARD ── */
      .scanner-card {
        background:var(--bg-card);
        border:1px solid var(--border);
        border-radius:var(--rx);
        padding:20px 18px;
        box-shadow:var(--shadow-lg);
        margin-bottom:12px;
      }
      .scanner-label {
        font-family:var(--mono);
        font-size:9px; letter-spacing:2px; text-transform:uppercase;
        color:var(--text-faint); text-align:center; margin-bottom:14px;
      }

      /* QR frame */
      .qr-frame-wrap {
        position:relative; width:100%; aspect-ratio:1;
        max-width:290px; margin:0 auto 16px;
      }
      .qr-frame {
        width:100%;height:100%;
        border-radius:var(--rl);
        background:rgba(0,0,0,0.03);
        border:1px solid var(--border);
        position:relative; overflow:hidden;
        transition:border-color 0.3s, box-shadow 0.3s;
      }
      .qr-frame.scanning {
        border-color:var(--accent-border);
        box-shadow:0 0 0 2px var(--accent-light), 0 0 28px var(--accent-glow);
      }
      .qr-frame.success {
        border-color:var(--green-border);
        box-shadow:0 0 0 2px var(--green-bg), 0 0 20px rgba(22,163,74,0.15);
      }
      .qr-frame.error-state {
        border-color:var(--red-border);
        box-shadow:0 0 0 2px var(--red-bg), 0 0 20px rgba(220,38,38,0.12);
      }

      /* corners */
      .corner { position:absolute; width:26px; height:26px; z-index:10; }
      .corner-tl { top:10px;left:10px; border-top:2px solid var(--accent); border-left:2px solid var(--accent); border-radius:6px 0 0 0; }
      .corner-tr { top:10px;right:10px; border-top:2px solid var(--accent); border-right:2px solid var(--accent); border-radius:0 6px 0 0; }
      .corner-bl { bottom:10px;left:10px; border-bottom:2px solid var(--accent); border-left:2px solid var(--accent); border-radius:0 0 0 6px; }
      .corner-br { bottom:10px;right:10px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); border-radius:0 0 6px 0; }
      .scan-line {
        position:absolute; left:12%; right:12%; height:2px; top:50%;
        background:linear-gradient(90deg,transparent,var(--accent),transparent);
        border-radius:2px; opacity:0;
        animation:none;
      }
      .qr-frame.scanning .scan-line { opacity:1; animation:scan-sweep 2s ease-in-out infinite; }
      @keyframes scan-sweep { 0%{top:15%} 50%{top:85%} 100%{top:15%} }

      /* idle overlay */
      .scanner-idle {
        position:absolute; inset:0;
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
        background:rgba(247,245,240,0.95);
        border-radius:var(--rl);
      }
      .idle-icon { color:var(--text-faint); }
      .idle-text { font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text-faint);text-transform:uppercase; }

      /* html5-qrcode cleanup */
      #qr-reader, #qr-reader-face {
        width:100% !important; height:100% !important;
      }
      #qr-reader video, #qr-reader-face video {
        width:100% !important; height:100% !important; object-fit:cover !important;
      }
      #qr-reader img, #qr-reader-face img,
      #qr-reader button, #qr-reader-face button,
      #qr-reader__dashboard, #qr-reader-face__dashboard { display:none !important; }

      /* ── SCANNER CONTROLS ── */
      .scan-controls { display:flex; gap:8px; margin-top:4px; }
      .btn {
        flex:1; padding:11px 14px;
        border:none; border-radius:var(--r);
        font-family:var(--font); font-size:13px; font-weight:600;
        cursor:pointer; transition:all 0.2s;
        display:flex; align-items:center; justify-content:center; gap:6px;
      }
      .btn svg { width:15px;height:15px;flex-shrink:0; }
      .btn-primary  { background:var(--accent); color:#fff; box-shadow:0 2px 12px var(--accent-glow); }
      .btn-primary:hover  { background:#7a38d4; transform:translateY(-1px); }
      .btn-secondary {
        background:var(--bg-card); color:var(--text-muted);
        border:1px solid var(--border); flex:0 0 auto; padding:11px 14px;
      }
      .btn-secondary:hover { border-color:var(--accent-border); color:var(--accent); }
      .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none !important; }
      .btn-flip {
        background:var(--bg-card); color:var(--text-muted);
        border:1px solid var(--border);
        padding:10px 14px; border-radius:var(--r);
        font-family:var(--font); font-size:12px; font-weight:600;
        cursor:pointer; transition:all 0.2s;
        display:flex; align-items:center; gap:5px;
      }
      .btn-flip:hover { border-color:var(--accent-border); color:var(--accent); }
      .btn-flip svg { width:14px;height:14px; }

      /* ── FACE MODE ── */
      .face-frame-wrap {
        position:relative; width:100%; aspect-ratio:1;
        max-width:240px; margin:0 auto 12px;
      }
      .face-frame {
        width:100%;height:100%;
        border-radius:50%;
        background:rgba(0,0,0,0.03);
        border:2px solid var(--border);
        overflow:hidden; position:relative;
        transition:border-color 0.3s, box-shadow 0.3s;
      }
      .face-frame.verifying { border-color:var(--accent-border); box-shadow:0 0 0 4px var(--accent-light), 0 0 28px var(--accent-glow); }
      .face-frame.verified  { border-color:var(--green-border);  box-shadow:0 0 0 4px var(--green-bg), 0 0 20px rgba(22,163,74,0.15); }
      #face-video { width:100%;height:100%;object-fit:cover;border-radius:50%; }
      .face-ring {
        position:absolute; inset:-4px; border-radius:50%;
        border:2px dashed var(--accent-border);
        animation:rotate 4s linear infinite; pointer-events:none;
      }
      @keyframes rotate { to { transform:rotate(360deg); } }
      .face-msg { font-family:var(--mono);font-size:11px;text-align:center;color:var(--text-faint);margin-bottom:12px;letter-spacing:1px; }

      /* face+qr step 2 layout */
      .face-qr-row { display:flex; gap:10px; align-items:flex-start; margin-bottom:12px; }
      .face-qr-row .face-frame-wrap { max-width:110px;flex-shrink:0;margin:0; }
      .face-qr-row .qr-frame-wrap   { flex:1;margin:0; }

      /* ── STATUS CARD ── */
      .status-card {
        border-radius:var(--rl); padding:18px;
        border:1px solid var(--border);
        background:var(--bg-card);
        box-shadow:var(--shadow);
        margin-bottom:12px;
        transition:all 0.3s;
      }
      .status-card.s-idle    { background:var(--bg-card); border-color:var(--border); }
      .status-card.s-processing { background:var(--accent-light); border-color:var(--accent-border); }
      .status-card.s-success { background:var(--green-bg); border-color:var(--green-border); }
      .status-card.s-error   { background:var(--red-bg);   border-color:var(--red-border); }
      .status-card.s-warning { background:var(--amber-bg); border-color:var(--amber-border); }

      .status-inner { display:flex; align-items:flex-start; gap:12px; }
      .status-icon-wrap {
        width:40px;height:40px; border-radius:11px;
        display:flex;align-items:center;justify-content:center;flex-shrink:0;
      }
      .s-idle       .status-icon-wrap { background:var(--accent-light); }
      .s-processing .status-icon-wrap { background:rgba(142,68,236,0.15); }
      .s-success    .status-icon-wrap { background:rgba(22,163,74,0.15); }
      .s-error      .status-icon-wrap { background:rgba(220,38,38,0.12); }
      .s-warning    .status-icon-wrap { background:rgba(217,119,6,0.12); }
      .status-icon { width:20px;height:20px;transition:color 0.3s; }
      .s-idle       .status-icon { color:var(--accent); }
      .s-processing .status-icon { color:var(--accent); animation:spin 1s linear infinite; }
      .s-success    .status-icon { color:var(--green); }
      .s-error      .status-icon { color:var(--red); }
      .s-warning    .status-icon { color:var(--amber); }
      @keyframes spin { to { transform:rotate(360deg); } }

      .status-content { flex:1; min-width:0; }
      .status-title { font-size:14px;font-weight:700;margin-bottom:3px; }
      .s-idle       .status-title { color:var(--text-muted); }
      .s-processing .status-title { color:var(--accent); }
      .s-success    .status-title { color:var(--green); }
      .s-error      .status-title { color:var(--red); }
      .s-warning    .status-title { color:var(--amber); }
      .status-msg { font-size:12.5px;color:var(--text-muted);line-height:1.4; }

      .user-result {
        margin-top:12px;padding-top:12px;
        border-top:1px solid rgba(0,0,0,0.06);
        display:none;
      }
      .user-result.visible { display:block; }
      .user-name  { font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px; }
      .user-email { font-family:var(--mono);font-size:10px;color:var(--text-faint); }
      .action-badge {
        display:inline-flex;align-items:center;gap:5px;
        margin-top:8px;padding:4px 11px;border-radius:20px;
        font-size:11px;font-weight:700;letter-spacing:0.4px;
      }
      .action-badge.in  { background:var(--green-bg); color:var(--green); }
      .action-badge.out { background:var(--accent-light); color:var(--accent); }

      /* ── SUCCESS OVERLAY ── */
      .success-overlay {
        position:fixed; inset:0; z-index:200;
        background:rgba(247,245,240,0.96);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        text-align:center; padding:32px;
        opacity:0; pointer-events:none;
        transition:opacity 0.35s;
      }
      .success-overlay.show { opacity:1; pointer-events:all; }
      .success-circle {
        width:88px;height:88px;
        border-radius:50%;
        background:var(--green-bg);
        border:2px solid var(--green-border);
        display:flex;align-items:center;justify-content:center;
        margin-bottom:20px;
        animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
      }
      @keyframes pop { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
      .success-circle svg { width:44px;height:44px;color:var(--green); }
      .success-name  { font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px; }
      .success-action { font-size:15px;font-weight:600;margin-bottom:6px; }
      .success-action.in  { color:var(--green); }
      .success-action.out { color:var(--accent); }
      .success-note { font-family:var(--mono);font-size:11px;color:var(--text-faint); }

      /* ── TOAST ── */
      .toast {
        position:fixed;bottom:20px;left:50%;
        transform:translateX(-50%) translateY(12px);
        background:var(--text);color:#fff;
        border-radius:100px;padding:8px 18px;
        font-size:13px;font-weight:600;
        z-index:9999;opacity:0;
        transition:opacity 0.22s,transform 0.22s;
        pointer-events:none;white-space:nowrap;
        box-shadow:0 4px 20px rgba(0,0,0,0.2);
      }
      .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

      /* ── RESPONSIVE ── */
      @media(max-width:380px) {
        .app { padding:0 12px 24px; }
        .qr-frame-wrap { max-width:260px; }
      }
    </style>
  </head>
  <body>
    <div class="app">

      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-logo">
          <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <path d="M14 14h3v3M17 17h4M14 21h3"/>
            </svg>
          </div>
          <div class="logo-name">Scan<span>Pass</span></div>
        </div>
        <div class="topbar-right">
          <div class="badge-live"><span class="live-dot"></span>Scanner</div>
        </div>
      </div>

      <!-- Mini stats -->
      <div class="stats-row">
        <div class="stat-tile st-a">
          <div class="stat-label">Present</div>
          <div class="stat-val a" id="s-present">–</div>
        </div>
        <div class="stat-tile st-g">
          <div class="stat-label">Scans Today</div>
          <div class="stat-val g" id="s-scans">–</div>
        </div>
        <div class="stat-tile">
          <div class="stat-label">Users</div>
          <div class="stat-val" id="s-total">–</div>
        </div>
      </div>

      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-qr-btn" onclick="setMode('qr')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M17 17h4M14 21h3"/>
          </svg>QR Only
        </button>
        <button class="mode-btn" id="mode-face-btn" onclick="setMode('face')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          </svg>Face + QR
        </button>
      </div>

      <!-- ── QR MODE ── -->
      <div id="qr-mode-ui">
        <div class="scanner-card">
          <div class="scanner-label">◈ QR Verification Scanner ◈</div>
          <div class="qr-frame-wrap">
            <div class="qr-frame" id="qr-frame">
              <div class="corner corner-tl"></div>
              <div class="corner corner-tr"></div>
              <div class="corner corner-bl"></div>
              <div class="corner corner-br"></div>
              <div class="scan-line" id="scan-line"></div>
              <div id="qr-reader"></div>
              <div class="scanner-idle" id="scanner-idle">
                <div class="idle-icon">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M17 17h4M14 21h3"/>
                  </svg>
                </div>
                <div class="idle-text">Camera off</div>
              </div>
            </div>
          </div>

          <!-- controls row: start/stop + flip -->
          <div class="scan-controls">
            <button class="btn btn-primary" id="btn-start" onclick="startCamera()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
              </svg>Enable Camera
            </button>
            <button class="btn btn-secondary hidden" id="btn-stop" onclick="stopCamera()">Stop</button>
            <button class="btn-flip hidden" id="btn-flip" onclick="flipCamera()" title="Flip Camera">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>Flip
            </button>
          </div>
        </div>
      </div>

      <!-- ── FACE MODE ── -->
      <div id="face-mode-ui" class="hidden">
        <div class="scanner-card">
          <div class="scanner-label">◈ Face Verification ◈</div>

          <!-- Step 1: face capture -->
          <div id="face-step-1">
            <div class="face-frame-wrap">
              <div class="face-frame" id="face-frame">
                <video id="face-video" autoplay muted playsinline></video>
                <div class="face-ring"></div>
              </div>
            </div>
            <div class="face-msg" id="face-msg">Position face in circle — auto-captures in 3s</div>
            <canvas id="face-canvas" style="display:none"></canvas>
            <div class="scan-controls">
              <button class="btn btn-primary" id="btn-face-start" onclick="startFaceCapture()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                </svg>Start Verification
              </button>
              <button class="btn btn-secondary hidden" id="btn-face-stop" onclick="cancelFaceCapture()">Cancel</button>
            </div>
          </div>

          <!-- Step 2: face preview + QR scan -->
          <div id="face-step-2" class="hidden">
            <div class="face-qr-row">
              <div class="face-frame-wrap">
                <div class="face-frame verified">
                  <canvas id="face-preview-canvas" style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:block"></canvas>
                </div>
              </div>
              <div class="qr-frame-wrap">
                <div class="qr-frame scanning">
                  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
                  <div class="corner corner-bl"></div><div class="corner corner-br"></div>
                  <div class="scan-line"></div>
                  <div id="qr-reader-face"></div>
                </div>
              </div>
            </div>
            <button class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="resetFaceMode()">↩ Restart</button>
          </div>
        </div>
      </div>

      <!-- Status Card -->
      <div class="status-card s-idle" id="status-card">
        <div class="status-inner">
          <div class="status-icon-wrap">
            <svg class="status-icon" id="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
            </svg>
          </div>
          <div class="status-content">
            <div class="status-title" id="status-title">Ready to Scan</div>
            <div class="status-msg" id="status-msg">Enable camera to start scanning QR codes</div>
            <div class="user-result" id="user-result">
              <div class="user-name"  id="result-name">—</div>
              <div class="user-email" id="result-email">—</div>
              <div class="action-badge" id="result-badge">—</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /app -->

    <!-- Success overlay -->
    <div class="success-overlay" id="success-overlay">
      <div class="success-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-name"  id="ov-name">Name</div>
      <div class="success-action" id="ov-action">Marked IN</div>
      <div class="success-note"  id="ov-note">Closing scanner…</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ═══════════════════════ JS ═══════════════════════ -->
    <script>
    "use strict";

    /* ── CONFIG ── */
    const API_URL = "https://script.google.com/macros/s/AKfycbxTC7WK3obS6MG8tR6UggAOgeBAbUnLpora5diJEGaUn6CD9OvVqWQh0PknIRKSsU1L5A/exec";
    // Paste the Apps Script portal URL here so scanner can redirect back:
    const PORTAL_URL = "https://script.google.com/macros/s/AKfycbxTC7WK3obS6MG8tR6UggAOgeBAbUnLpora5diJEGaUn6CD9OvVqWQh0PknIRKSsU1L5A/exec";

    /* ── STATE ── */
    const APP = {
      qrScanner:    null,
      faceScanner:  null,
      faceStream:   null,
      faceImageData: null,
      scanning:     false,
      scanLocked:   false,
      mode:         'qr',
      cameras:      [],
      cameraIndex:  0, // index into APP.cameras for QR mode
      _unlockTimer: null,
      _statsTimer:  null,
    };

    /* ── HELPERS ── */
    const $ = id => document.getElementById(id);

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function getDevice() {
      const ua = navigator.userAgent;
      const type = /Mobile|Android|iPhone|iPad/i.test(ua) ? 'Mobile' : 'Desktop';
      const os = /Android/i.test(ua) ? 'Android' : /iPhone|iPad/i.test(ua) ? 'iOS' :
                 /Windows/i.test(ua) ? 'Win' : /Mac/i.test(ua) ? 'Mac' : 'Other';
      return type + ' · ' + os + ' · Vercel';
    }

    let _toastTimer;
    function showToast(msg, duration) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => t.classList.remove('show'), duration || 2800);
    }

    function _isMobile() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    const VIRTUAL_CAM_RE = /obs|virtual|snap|manycam|droidcam|iriun|epoccam|mmhmm|xsplit|ndi|ecamm/i;

    /* ── BACKEND ── */
    function callBackend(fnName, args, onSuccess, onFail) {
      fetch(API_URL, {
        method:'POST', mode:'cors', redirect:'follow',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify({ functionName: fnName, args: args }),
      })
        .then(r => r.text())
        .then(text => { const d = JSON.parse(text); if (onSuccess) onSuccess(d); })
        .catch(err => { console.error('[FETCH]', err); if (onFail) onFail(err); });
    }

    /* ── STATS ── */
    function loadStats() {
      callBackend('getDashboardStats', [], data => {
        if (data && data.success) {
          _setText('s-present', data.presentNow ?? '–');
          _setText('s-scans',   data.scansToday ?? '–');
          _setText('s-total',   data.totalUsers  ?? '–');
        }
      }, null);
    }

    function _setText(id, val) {
      const el = $(id);
      if (el) el.textContent = val;
    }

    /* ── STATUS CARD ── */
    const ICONS = {
      idle:       '<circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>',
      processing: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
      success:    '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
      error:      '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
      warning:    '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/>',
    };

    const STATE_MAP = { idle:'s-idle', processing:'s-processing', success:'s-success', error:'s-error', warning:'s-warning' };

    function setStatus(state, title, msg) {
      const card = $('status-card');
      card.className = 'status-card ' + (STATE_MAP[state] || 's-idle');
      $('status-icon').innerHTML = ICONS[state] || ICONS.idle;
      $('status-title').textContent = title;
      $('status-msg').textContent = msg;
      $('user-result').classList.remove('visible');
    }

    function showUserResult(name, email, action) {
      $('result-name').textContent  = name  || '—';
      $('result-email').textContent = email || '—';
      const b = $('result-badge');
      b.textContent = action === 'IN' ? '✓ Marked IN' : '✓ Marked OUT';
      b.className = 'action-badge ' + (action === 'IN' ? 'in' : 'out');
      $('user-result').classList.add('visible');
    }

    /* ── ERROR MAP ── */
    const ERROR_MAP = {
      INVALID_QR:       { title:'Invalid QR Code',    msg:'This QR is not registered.',           state:'error' },
      DUPLICATE_BLOCKED:{ title:'Duplicate Blocked',  msg:'Already scanned. Wait a moment.',      state:'warning' },
      CAMERA_DENIED:    { title:'Camera Denied',      msg:'Allow camera in browser settings.',    state:'error' },
      NO_CAMERA:        { title:'No Camera Found',    msg:'No camera detected on this device.',   state:'error' },
      NETWORK_ERROR:    { title:'Network Error',      msg:'Could not reach server.',              state:'error' },
      SERVER_BUSY:      { title:'Server Busy',        msg:'Too many scans. Retry in a moment.',   state:'warning' },
      SERVER_ERROR:     { title:'Server Error',       msg:'Internal error. Contact admin.',       state:'error' },
      CONFIG_ERROR:     { title:'Config Error',       msg:'Sheets not configured correctly.',     state:'error' },
      UNKNOWN_ERROR:    { title:'Unknown Error',      msg:'An unexpected error occurred.',        state:'error' },
    };
    function getErrorUI(code) { return ERROR_MAP[code] || ERROR_MAP.UNKNOWN_ERROR; }

    /* ── MODE TOGGLE ── */
    function setMode(mode) {
      if (APP.mode === mode) return;
      APP.mode = mode;
      clearTimeout(APP._unlockTimer);
      APP.scanLocked = false;
      stopCamera();
      resetFaceMode();
      $('mode-qr-btn').classList.toggle('active', mode === 'qr');
      $('mode-face-btn').classList.toggle('active', mode === 'face');
      $('qr-mode-ui').classList.toggle('hidden', mode !== 'qr');
      $('face-mode-ui').classList.toggle('hidden', mode !== 'face');
      setStatus('idle','Ready to Scan', mode === 'face' ? 'Start face verification, then scan QR' : 'Enable camera to start scanning');
    }

    /* ══════════════════════════════════════
       CAMERA PICKING
    ══════════════════════════════════════ */
    function _pickRearCamera(cameras) {
      const real = cameras.filter(c => !VIRTUAL_CAM_RE.test(c.label));
      const byLabel = real.find(c => /back|rear|environment/i.test(c.label));
      if (byLabel) return byLabel;
      if (_isMobile() && real.length > 1) return real[real.length - 1];
      return real[0] || cameras[cameras.length - 1];
    }

    function _pickFrontCamera(cameras) {
      const real = cameras.filter(c => !VIRTUAL_CAM_RE.test(c.label));
      const byLabel = real.find(c => /front|user|face|selfie/i.test(c.label));
      if (byLabel) return byLabel;
      if (_isMobile() && real.length > 1) return real[0];
      return real[0] || cameras[0];
    }

    /* ══════════════════════════════════════
       QR SCANNER
    ══════════════════════════════════════ */
    function startCamera() {
      $('btn-start').disabled = true;
      setStatus('processing','Starting Camera…','Requesting camera permission');
      clearTimeout(APP._unlockTimer);
      APP.scanLocked = false;

      // Tear down old instance
      if (APP.qrScanner) {
        const old = APP.qrScanner;
        APP.qrScanner = null;
        APP.scanning = false;
        old.stop().catch(()=>{}).finally(()=>old.clear().catch(()=>{}));
      }

      setTimeout(() => {
        APP.qrScanner = new Html5Qrcode('qr-reader');

        // Load cameras list for flip functionality
        Html5Qrcode.getCameras().then(cameras => {
          APP.cameras = cameras || [];
          // Set initial index to rear cam
          const rear = _pickRearCamera(APP.cameras);
          APP.cameraIndex = APP.cameras.indexOf(rear);
          if (APP.cameraIndex < 0) APP.cameraIndex = 0;
        }).catch(()=>{ APP.cameras=[]; APP.cameraIndex=0; });

        if (_isMobile()) {
          APP.qrScanner.start(
            { facingMode: { exact: 'environment' } },
            { fps:15, qrbox:{width:220,height:220}, aspectRatio:1.0, disableFlip:false },
            onQRSuccess, ()=>{}
          ).then(_onQRCameraReady).catch(() => {
            if (!APP.qrScanner) return;
            APP.qrScanner.start(
              { facingMode: 'environment' },
              { fps:15, qrbox:{width:220,height:220}, aspectRatio:1.0, disableFlip:false },
              onQRSuccess, ()=>{}
            ).then(_onQRCameraReady).catch(_onQRCameraError);
          });
        } else {
          Html5Qrcode.getCameras().then(cameras => {
            if (!cameras || !cameras.length) throw { name:'NO_CAMERA' };
            if (!APP.qrScanner) throw { name:'ABORTED' };
            const cam = _pickRearCamera(cameras);
            APP.cameraIndex = cameras.indexOf(cam);
            if (APP.cameraIndex < 0) APP.cameraIndex = 0;
            return APP.qrScanner.start(cam.id, { fps:15, qrbox:{width:220,height:220}, aspectRatio:1.0 }, onQRSuccess, ()=>{});
          }).then(_onQRCameraReady).catch(e => {
            if (e?.name === 'ABORTED') return;
            _onQRCameraError(e);
          });
        }
      }, APP.scanning ? 300 : 0);
    }

    function _onQRCameraReady() {
      APP.scanning = true;
      APP.scanLocked = false;
      $('scanner-idle').style.display = 'none';
      $('qr-frame').classList.add('scanning');
      $('btn-start').classList.add('hidden');
      $('btn-stop').classList.remove('hidden');
      $('btn-flip').classList.remove('hidden');
      $('btn-start').disabled = false;
      setStatus('processing','Scanning…','Align QR code within the frame');
    }

    function _onQRCameraError(err) {
      const isNoCam    = err?.name==='NO_CAMERA' || /NotFound/i.test(String(err));
      const isDenied   = /Permission|NotAllowed/i.test(String(err));
      const code = isNoCam ? 'NO_CAMERA' : isDenied ? 'CAMERA_DENIED' : 'UNKNOWN_ERROR';
      const ui = getErrorUI(code);
      setStatus(ui.state, ui.title, ui.msg);
      showToast('✗ ' + ui.title);
      resetQRButtons();
    }

    function stopCamera() {
      clearTimeout(APP._unlockTimer);
      APP.scanLocked = false;
      $('btn-flip').classList.add('hidden');

      if (!APP.qrScanner) {
        APP.scanning = false;
        $('scanner-idle').style.display = '';
        $('qr-frame').classList.remove('scanning');
        resetQRButtons();
        setStatus('idle','Ready to Scan','Enable camera to start scanning QR codes');
        return;
      }
      const scanner = APP.qrScanner;
      APP.qrScanner = null;
      APP.scanning  = false;
      scanner.stop().catch(()=>{}).finally(() => {
        scanner.clear().catch(()=>{});
        $('scanner-idle').style.display = '';
        $('qr-frame').classList.remove('scanning');
        resetQRButtons();
        setStatus('idle','Ready to Scan','Enable camera to start scanning QR codes');
      });
    }

    function resetQRButtons() {
      $('btn-start').disabled = false;
      $('btn-start').classList.remove('hidden');
      $('btn-stop').classList.add('hidden');
    }

    /* ══════════════════════════════════════
       FLIP CAMERA
    ══════════════════════════════════════ */
    async function flipCamera() {
      if (!APP.scanning && APP.mode === 'qr') {
        showToast('Start camera first');
        return;
      }

      let cameras = APP.cameras;
      if (!cameras || cameras.length === 0) {
        try { cameras = await Html5Qrcode.getCameras(); APP.cameras = cameras; }
        catch(e) { showToast('Could not enumerate cameras'); return; }
      }

      if (!cameras || cameras.length < 2) {
        showToast('Only one camera detected');
        return;
      }

      // Stop current scanner cleanly
      setStatus('processing','Flipping Camera…','Switching camera…');
      const old = APP.qrScanner;
      APP.qrScanner = null;
      APP.scanning  = false;

      try { await old.stop(); } catch(_) {}
      try { old.clear(); } catch(_) {}

      // Advance to next camera
      APP.cameraIndex = (APP.cameraIndex + 1) % cameras.length;
      const nextCam = cameras[APP.cameraIndex];

      await new Promise(r => setTimeout(r, 300));

      if (APP.mode !== 'qr') return; // user may have switched mode

      APP.qrScanner = new Html5Qrcode('qr-reader');
      try {
        await APP.qrScanner.start(
          nextCam.id,
          { fps:15, qrbox:{width:220,height:220}, aspectRatio:1.0, disableFlip:false },
          onQRSuccess, ()=>{}
        );
        _onQRCameraReady();
        showToast('Camera switched');
      } catch(e) {
        // Try facingMode toggle as last resort
        try {
          const facing = _isMobile()
            ? { facingMode: APP.cameraIndex === 0 ? 'user' : 'environment' }
            : { facingMode: 'user' };
          await APP.qrScanner.start(facing, { fps:15, qrbox:{width:220,height:220}, aspectRatio:1.0 }, onQRSuccess, ()=>{});
          _onQRCameraReady();
          showToast('Camera switched');
        } catch(e2) {
          _onQRCameraError(e2);
          showToast('✗ Flip failed — try again');
        }
      }
    }

    /* ══════════════════════════════════════
       QR DECODE CALLBACK
    ══════════════════════════════════════ */
    function onQRSuccess(decodedText) {
      if (!APP.qrScanner && APP.mode === 'qr') return;
      if (APP.scanLocked) return;
      APP.scanLocked = true;

      let userId = decodedText, secretKey = '';
      try {
        const decoded = decodeURIComponent(decodedText);
        const parsed  = JSON.parse(decoded);
        if (parsed && parsed.uid) { userId = parsed.uid; secretKey = parsed.key || ''; }
      } catch(_) {}

      if (!userId || !String(userId).trim()) {
        setStatus('error','Invalid QR','Could not read user ID from QR code.');
        _unlockScanner(2000);
        return;
      }

      setStatus('processing','Verifying…','Processing ID: ' + userId);
      callBackend('scanEntry', [userId.trim(), secretKey, getDevice(), APP.faceImageData || null],
        handleScanResult, handleScanError);
    }

    function _unlockScanner(delay) {
      clearTimeout(APP._unlockTimer);
      APP._unlockTimer = setTimeout(() => {
        APP.scanLocked = false;
        if (APP.mode === 'qr' && APP.scanning)
          setStatus('processing','Scanning…','Align QR code within the frame');
      }, delay);
    }

    /* ══════════════════════════════════════
       SCAN RESULT
    ══════════════════════════════════════ */
    function handleScanResult(result) {
      if (!result) { const ui = getErrorUI('NETWORK_ERROR'); setStatus(ui.state,ui.title,ui.msg); _unlockScanner(2500); return; }

      const code = result.code || '';

      if (code === 'IN' || code === 'OUT') {
        // Update mini stats
        if (result.data) {
          if (result.data.scansToday !== undefined) _setText('s-scans',   result.data.scansToday);
          if (result.data.presentNow !== undefined) _setText('s-present', result.data.presentNow);
        }

        setStatus('success', code==='IN' ? '✓ Entry Logged – IN' : '✓ Exit Logged – OUT', result.message || '');
        showUserResult(result.data?.name, result.data?.email, code);
        showToast((result.data?.name || 'User') + ' → ' + code);

        // Notify parent portal if in popup/iframe
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type:'SCAN_SUCCESS', data: result.data }, '*');
          }
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type:'SCAN_SUCCESS', data: result.data }, '*');
          }
        } catch(_) {}

        // Show big success overlay then close
        _showSuccessOverlay(result.data?.name, code, result.data);

        if (APP.mode === 'face') {
          setTimeout(resetFaceMode, 3000);
        } else {
          _unlockScanner(2500);
        }
        return;
      }

      const ui = getErrorUI(code);
      setStatus(ui.state, ui.title, result.message || ui.msg);
      showToast((ui.state==='warning'?'⚠ ':'✗ ') + ui.title);
      const cooldown = code==='DUPLICATE_BLOCKED'||code==='SERVER_BUSY' ? 2000 : 2500;
      _unlockScanner(cooldown);
    }

    function handleScanError(err) {
      const ui = getErrorUI('NETWORK_ERROR');
      setStatus(ui.state, ui.title, 'Failed to reach server. Check connection.');
      showToast('✗ Network Error');
      _unlockScanner(3000);
    }

    function _showSuccessOverlay(name, action, data) {
      const ov = $('success-overlay');
      $('ov-name').textContent = name || 'User';
      $('ov-action').textContent = action === 'IN' ? '✓ Marked IN' : '✓ Marked OUT';
      $('ov-action').className = 'success-action ' + (action === 'IN' ? 'in' : 'out');
      $('ov-note').textContent = 'Closing scanner in 2s…';
      ov.classList.add('show');

      setTimeout(() => {
        ov.classList.remove('show');
        // Try to close window; fallback to redirect
        try { window.close(); } catch(_) {}
        setTimeout(() => {
          if (!document.hidden) {
            const portalUrl = PORTAL_URL !== 'YOUR_APPS_SCRIPT_PORTAL_URL_HERE' ? PORTAL_URL : null;
            if (portalUrl) window.location.href = portalUrl;
            else $('ov-note').textContent = 'You can close this tab now.';
          }
        }, 500);
      }, 2000);
    }

    /* ══════════════════════════════════════
       FACE MODE
    ══════════════════════════════════════ */
    function startFaceCapture() {
      $('btn-face-start').disabled = true;
      setStatus('processing','Starting Camera…','Opening front camera for identity snapshot');

      const frontExact = _isMobile()
        ? { facingMode:{exact:'user'}, width:{ideal:480}, height:{ideal:480} }
        : { facingMode:'user', width:{ideal:480}, height:{ideal:480} };

      function _attach(stream) {
        APP.faceStream = stream;
        const video = $('face-video');
        video.srcObject = stream; video.play();
        $('face-frame').className = 'face-frame verifying';
        $('face-msg').textContent = 'Hold still — capturing in 3 seconds…';
        $('btn-face-start').classList.add('hidden');
        $('btn-face-stop').classList.remove('hidden');
        setStatus('processing','Face Camera Active','Keep face centred inside the circle');
        setTimeout(() => { if (APP.faceStream) captureFaceFrame(video); }, 3000);
      }

      function _fail(err) {
        const isDenied  = /Permission|NotAllowed/i.test(String(err));
        const isNoCam   = /NotFound|DevicesNotFound|OverconstrainedError/i.test(String(err));
        const ui = getErrorUI(isNoCam ? 'NO_CAMERA' : isDenied ? 'CAMERA_DENIED' : 'UNKNOWN_ERROR');
        setStatus(ui.state, ui.title, ui.msg);
        showToast('✗ ' + ui.title);
        $('btn-face-start').disabled = false;
      }

      navigator.mediaDevices.getUserMedia({ video: frontExact, audio: false })
        .then(_attach)
        .catch(() => navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:{ideal:480}, height:{ideal:480} }, audio:false })
          .then(_attach)
          .catch(() => Html5Qrcode.getCameras()
            .then(cameras => {
              const front = _pickFrontCamera(cameras);
              if (!front) throw new Error('no front cam');
              return navigator.mediaDevices.getUserMedia({ video:{ deviceId:{ exact:front.id } }, audio:false });
            })
            .then(_attach)
            .catch(_fail)));
    }

    function captureFaceFrame(video) {
      if (!APP.faceStream) return;
      const canvas = $('face-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth || 480;
      canvas.height = video.videoHeight || 480;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      APP.faceImageData = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

      // Stop face stream
      APP.faceStream.getTracks().forEach(t => t.stop());
      APP.faceStream = null;

      // Copy face preview
      const prev = $('face-preview-canvas');
      prev.width = canvas.width; prev.height = canvas.height;
      prev.getContext('2d').drawImage(canvas, 0, 0);

      $('face-step-1').classList.add('hidden');
      $('face-step-2').classList.remove('hidden');

      setStatus('processing','Face Captured','Now scan the QR code to complete verification');
      showToast('✓ Face captured — scan QR now');

      // Start QR scan for face mode
      APP.faceScanner = new Html5Qrcode('qr-reader-face');
      if (_isMobile()) {
        APP.faceScanner.start({ facingMode:{exact:'environment'} }, { fps:15, qrbox:{width:180,height:180} }, onQRSuccess, ()=>{})
          .catch(() => APP.faceScanner?.start({ facingMode:'environment' }, { fps:15, qrbox:{width:180,height:180} }, onQRSuccess, ()=>{}));
      } else {
        Html5Qrcode.getCameras().then(cams => {
          const cam = _pickRearCamera(cams);
          return APP.faceScanner?.start(cam.id, { fps:15, qrbox:{width:180,height:180} }, onQRSuccess, ()=>{});
        }).catch(() => {});
      }
    }

    function cancelFaceCapture() {
      if (APP.faceStream) { APP.faceStream.getTracks().forEach(t=>t.stop()); APP.faceStream = null; }
      $('btn-face-start').disabled = false;
      $('btn-face-start').classList.remove('hidden');
      $('btn-face-stop').classList.add('hidden');
      $('face-frame').className = 'face-frame';
      $('face-msg').textContent = 'Position face in circle — auto-captures in 3s';
      setStatus('idle','Ready to Scan','Press Start — face is captured first, then scan QR');
    }

    function resetFaceMode() {
      if (APP.faceStream) { APP.faceStream.getTracks().forEach(t=>t.stop()); APP.faceStream = null; }
      if (APP.faceScanner) {
        const s = APP.faceScanner; APP.faceScanner = null;
        s.stop().catch(()=>{}).finally(()=>s.clear().catch(()=>{}));
      }
      APP.faceImageData = null;
      $('face-step-1').classList.remove('hidden');
      $('face-step-2').classList.add('hidden');
      $('face-frame').className = 'face-frame';
      $('face-msg').textContent = 'Position face in circle — auto-captures in 3s';
      $('btn-face-start').disabled = false;
      $('btn-face-start').classList.remove('hidden');
      $('btn-face-stop').classList.add('hidden');
      setStatus('idle','Ready to Scan','Press Start — face is captured first, then scan QR');
    }

    /* ── INIT ── */
    window.addEventListener('load', () => {
      setStatus('idle','Ready to Scan','Enable camera to start scanning QR codes');
      loadStats();
      // Refresh stats every 30s while scanner is open
      APP._statsTimer = setInterval(loadStats, 30000);
    });

    window.addEventListener('beforeunload', () => {
      clearInterval(APP._statsTimer);
    });
    </script>
  </body>
</html>
